name: Docker Edge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute backend image tags
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/multica-backend
          flavor: |
            latest=false
          tags: |
            type=raw,value=edge
            type=raw,value=main
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Multica Backend
            org.opencontainers.image.description=Multica self-hosted backend

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta_backend.outputs.labels }}
          tags: ${{ steps.meta_backend.outputs.tags }}
          cache-from: type=gha,scope=edge-backend
          cache-to: type=gha,mode=max,scope=edge-backend
          build-args: |
            VERSION=edge
            COMMIT=${{ github.sha }}

      - name: Compute web image tags
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/multica-web
          flavor: |
            latest=false
          tags: |
            type=raw,value=edge
            type=raw,value=main
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Multica Web
            org.opencontainers.image.description=Multica self-hosted web frontend

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta_web.outputs.labels }}
          tags: ${{ steps.meta_web.outputs.tags }}
          cache-from: type=gha,scope=edge-web
          cache-to: type=gha,mode=max,scope=edge-web
          build-args: |
            REMOTE_API_URL=http://backend:8080
            NEXT_PUBLIC_APP_VERSION=edge
